name: Release

on:
  push:
    tags:
      - 'v*'    # v1.0.0, v0.2.1, etc.
      - '[0-9]*'  # 1.0.0, 0.2.1, etc.
  workflow_dispatch:  # Manual trigger for testing
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v0.0.0'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for creating releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.version }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          # Strip leading 'v' for semver value used inside files
          semver="${tag#v}"
          echo "version=$tag" >> $GITHUB_OUTPUT
          echo "semver=$semver" >> $GITHUB_OUTPUT

      - name: Sync version into manifest and bl_info
        run: |
          semver="${{ steps.version.outputs.semver }}"
          # blender_manifest.toml: version = "x.y.z"
          sed -i -E "s/^version = \"[^\"]+\"/version = \"${semver}\"/" blender_manifest.toml
          # __init__.py bl_info: "version": (x, y, z)
          tuple_version=$(echo "$semver" | awk -F. '{printf "(%d, %d, %d)", $1, $2, ($3==""?0:$3)}')
          sed -i -E "s/\"version\": \([0-9]+, [0-9]+, [0-9]+\)/\"version\": ${tuple_version}/" __init__.py
          echo "--- blender_manifest.toml ---"
          grep '^version' blender_manifest.toml
          echo "--- __init__.py bl_info ---"
          grep '"version":' __init__.py

      - name: Build Blender extension
        run: |
          zip -r gltf_ktx2_extension.zip ./* -x .claude -x "*.pyc" -x "bin/*" -x "example/*" -x "*/__pycache__/*" -x "*.sh"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          files: gltf_ktx2_extension.zip
          generate_release_notes: true